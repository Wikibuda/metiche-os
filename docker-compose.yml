version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: metiche-os-app
    working_dir: /app
    command: /bin/sh -lc "python /app/scripts/bootstrap_openclaw_state.py && exec uvicorn app.main:app --host 0.0.0.0 --port 8091 --reload"
    ports:
      - "8091:8091"
    environment:
      METICHE_ENV: development
      DATABASE_URL: sqlite:////app/data/db/metiche_os.db
      OPENCLAW_READONLY_ROOT: /mnt/openclaw-ro
      OPENCLAW_CONFIG_PATH: /mnt/openclaw-state/openclaw.json
      OPENCLAW_STATE_DIR: /mnt/openclaw-state
      PROJECTIONS_ROOT: /app/projections
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18797}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      OPENCLAW_AUTOREPLY_LOG_GLOB: ${OPENCLAW_AUTOREPLY_LOG_GLOB:-/mnt/openclaw-logs/openclaw-*.log}
      OPENCLAW_AUTOREPLY_STATE_PATH: ${OPENCLAW_AUTOREPLY_STATE_PATH:-/app/data/openclaw-autoreply-state.json}
      WHATSAPP_SANDBOX_MODE: "false"
      WHATSAPP_ALLOWED_NUMBERS: ${WHATSAPP_ALLOWED_NUMBERS-}
    volumes:
      - ./:/app
      - /Users/gusluna/.openclaw:/mnt/openclaw-ro:ro
      - /tmp/openclaw:/mnt/openclaw-logs:ro
      - openclaw_state:/mnt/openclaw-state
      - ./data:/app/data
      - ./projections:/app/projections

  worker:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: metiche-os-worker
    working_dir: /app
    command: /bin/sh -lc "python /app/scripts/bootstrap_openclaw_state.py && exec python -m app.cli.main run-worker"
    environment:
      METICHE_ENV: development
      DATABASE_URL: sqlite:////app/data/db/metiche_os.db
      OPENCLAW_READONLY_ROOT: /mnt/openclaw-ro
      OPENCLAW_CONFIG_PATH: /mnt/openclaw-state/openclaw.json
      OPENCLAW_STATE_DIR: /mnt/openclaw-state
      PROJECTIONS_ROOT: /app/projections
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18797}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      OPENCLAW_AUTOREPLY_LOG_GLOB: ${OPENCLAW_AUTOREPLY_LOG_GLOB:-/mnt/openclaw-logs/openclaw-*.log}
      OPENCLAW_AUTOREPLY_STATE_PATH: ${OPENCLAW_AUTOREPLY_STATE_PATH:-/app/data/openclaw-autoreply-state.json}
      WHATSAPP_SANDBOX_MODE: "false"
      WHATSAPP_ALLOWED_NUMBERS: ${WHATSAPP_ALLOWED_NUMBERS-}
    volumes:
      - ./:/app
      - /Users/gusluna/.openclaw:/mnt/openclaw-ro:ro
      - /tmp/openclaw:/mnt/openclaw-logs:ro
      - openclaw_state:/mnt/openclaw-state
      - ./data:/app/data
      - ./projections:/app/projections

volumes:
  openclaw_state:
